name: python_setup

on:
  push:

jobs:
  python_setup:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: python code
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Dependency installation
        run: pip install pytest flake8

      - name: Python version verification
        run: python --version

      - name: Flake8 check
        run: flake8 --version

      - name: Pytest check
        run: pytest --version
